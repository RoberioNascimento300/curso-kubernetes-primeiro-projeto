apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-app
  namespace: dev  # <-- Desafio 3 — Primeiro Deploy no Kubernetes
  labels:
    app: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
      - name: hello-container
        image: roberionascimento300/hello-k8s:v1  
        ports:
        - containerPort: 5000